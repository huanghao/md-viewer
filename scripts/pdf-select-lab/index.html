<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>PDF 选中测试</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/web/pdf_viewer.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: 13px; background: #f5f5f5; }
#app { display: flex; height: 100vh; }

#pdf-area {
  flex: 1; overflow-y: auto;
  background: #525659; padding: 16px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.page-wrapper { position: relative; box-shadow: 0 2px 8px rgba(0,0,0,.4); background: white; cursor: crosshair; }
.page-wrapper canvas { display: block; }
/* Canvas 拉框模式：TextLayer 不再捕获鼠标，也不允许文本选中 */
.pdf-text-layer { position: absolute; top:0; left:0; pointer-events:none; user-select:none; }
/* 拉框 overlay canvas：覆盖在最上层，捕获所有鼠标事件 */
.select-overlay { position: absolute; top:0; left:0; pointer-events:auto; cursor:crosshair; }

mark.frozen-sel {
  background: rgba(255,120,0,0.45);
  border-radius:2px; padding:0; margin:0;
  display:inline; vertical-align:baseline;
  line-height:inherit; color:inherit;
  outline:1px solid rgba(255,120,0,0.8);
}

#panel {
  width:400px; min-width:400px;
  background:white; border-left:1px solid #e0e0e0;
  overflow-y:auto;
}
#panel-header { padding:10px 14px; background:#1a1a2e; color:white; position:sticky; top:0; z-index:10; }
#panel-header h2 { font-size:13px; font-weight:600; }
#panel-header p  { font-size:11px; color:#aaa; margin-top:2px; }

#controls {
  padding:10px 14px; border-bottom:1px solid #e0e0e0;
  display:flex; flex-direction:column; gap:6px;
  position:sticky; top:52px; z-index:9; background:white;
}
select { width:100%; padding:5px 8px; border:1px solid #ccc; border-radius:4px; font-size:12px; }
.row { display:flex; gap:8px; align-items:center; }
button.primary { padding:5px 12px; background:#1a73e8; color:white; border:none; border-radius:4px; cursor:pointer; font-size:12px; }
button.region-btn { padding:3px 8px; border:1px solid #ccc; border-radius:3px; cursor:pointer; font-size:11px; background:white; }
button.region-btn.selected { background:#1a73e8; color:white; border-color:#1a73e8; }

#main { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
.hint { color:#aaa; font-size:12px; text-align:center; padding:24px 0; }

.block { border:1px solid #e0e0e0; border-radius:6px; overflow:hidden; }
.block-hd {
  font-size:11px; font-weight:600; color:#555;
  padding:6px 10px; background:#fafafa; border-bottom:1px solid #f0f0f0;
  display:flex; justify-content:space-between;
}
.block-bd { padding:8px 10px; }

/* 三条路径 */
.path-row {
  padding:6px 10px; border-bottom:1px solid #f5f5f5; font-size:12px;
}
.path-row:last-of-type { border-bottom:none; }
.path-row-top {
  display:flex; justify-content:space-between; align-items:center;
  gap:6px; margin-bottom:3px;
}
.path-label { font-size:10px; color:#888; flex-shrink:0; }
.path-value {
  font-family:monospace; font-size:11px;
  word-break:break-all; color:#333;
  line-height:1.4;
}
.path-fb { display:flex; gap:4px; flex-shrink:0; }
.path-fb button {
  padding:2px 7px; border:1px solid #ccc; border-radius:3px;
  cursor:pointer; font-size:11px; background:white;
}
.path-fb button.ok  { background:#e6f4ea; color:#188038; border-color:#a8d5b5; }
.path-fb button.bad { background:#fce8e6; color:#c5221f; border-color:#f5b7b1; }

/* 你想要的 */
.text-input {
  width:100%; padding:7px 10px; border:none; border-top:1px solid #f0f0f0;
  font-size:13px; font-family:monospace; outline:none;
}
.note-input {
  width:100%; padding:7px 10px; border:none;
  font-size:12px; outline:none; resize:vertical; min-height:48px;
  font-family:-apple-system,sans-serif;
}

/* 技术数据 */
.data-row { display:flex; gap:6px; padding:4px 10px; border-bottom:1px solid #f8f8f8; font-size:11px; }
.data-row:last-child { border-bottom:none; }
.dk { color:#aaa; min-width:80px; flex-shrink:0; }
.dv { font-family:monospace; word-break:break-all; color:#333; }
.dv.ok   { color:#188038; }
.dv.warn { color:#e65100; }
.dv.bad  { color:#c5221f; }

button.submit-btn {
  width:100%; padding:9px; background:#1a73e8; color:white;
  border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:600;
}
button.submit-btn.done { background:#188038; }

#output-area { border-top:1px solid #e0e0e0; }
#output-area .out-label {
  font-size:10px; color:#888; padding:4px 10px 2px;
  display:flex; justify-content:space-between;
}
#output-text {
  width:100%; height:90px; padding:4px 10px; border:none; outline:none;
  font-family:monospace; font-size:10px; color:#333; resize:none;
  background:#fafafa; border-top:1px solid #f0f0f0;
}
</style>
</head>
<body>
<div id="app">
  <div id="pdf-area">
    <div class="hint" style="margin-top:60px">← 选择 PDF 并加载</div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <h2>PDF 选中测试</h2>
      <p id="mode-desc">Canvas 拉框模式：拖拽画矩形框选文字</p>
    </div>

    <div id="controls">
      <select id="pdf-select"><option value="">加载中...</option></select>
      <div class="row">
        <button class="primary" onclick="loadPdf()">加载</button>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px">
          <input type="number" id="page-count" value="3" min="1" max="20"
            style="width:36px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;font-size:11px"> 页
        </label>
      </div>
      <div>
        <div style="font-size:10px;color:#888;margin-bottom:4px">区域（先选再拖）：</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          <button class="region-btn selected" data-region="body" onclick="setRegion(this)">正文</button>
          <button class="region-btn" data-region="title" onclick="setRegion(this)">大标题</button>
          <button class="region-btn" data-region="heading" onclick="setRegion(this)">小标题</button>
          <button class="region-btn" data-region="abstract" onclick="setRegion(this)">摘要</button>
          <button class="region-btn" data-region="header" onclick="setRegion(this)">页眉页脚</button>
          <button class="region-btn" data-region="formula" onclick="setRegion(this)">公式</button>
          <button class="region-btn" data-region="caption" onclick="setRegion(this)">图注表注</button>
          <button class="region-btn" data-region="other" onclick="setRegion(this)">其他</button>
        </div>
        <input id="region-other" type="text" placeholder="其他区域说明"
          style="display:none;width:100%;margin-top:4px;padding:4px 8px;border:1px solid #ccc;border-radius:3px;font-size:11px">
      </div>
    </div>

    <div id="main"><div class="hint">加载 PDF 后拖拽选中文字</div></div>

    <div id="output-area">
      <div class="out-label">
        <span>提交内容（复制给 Claude）</span>
        <button onclick="copyOutput()" style="font-size:10px;padding:1px 6px;border:1px solid #ccc;border-radius:3px;cursor:pointer;background:white">复制</button>
      </div>
      <textarea id="output-text" readonly placeholder="点「提交」后内容出现在这里"></textarea>
    </div>
  </div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.worker.mjs';

const SCALE = 1.5;
let pdfDoc = null;
const textContents = {}, viewports = {};
let currentEntry = null;
let currentRegion = 'body';

window.setRegion = function(btn) {
  currentRegion = btn.dataset.region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('region-other').style.display = currentRegion === 'other' ? 'block' : 'none';
};

fetch('/pdfs').then(r => r.json()).then(list => {
  document.getElementById('pdf-select').innerHTML =
    list.map(f => `<option value="${f.path}">${f.name}</option>`).join('');
}).catch(() => {
  document.getElementById('pdf-select').innerHTML = '<option value="">获取列表失败</option>';
});

window.loadPdf = async function() {
  const path = document.getElementById('pdf-select').value.trim();
  const n = parseInt(document.getElementById('page-count').value) || 3;
  if (!path) return;
  clearFrozenMarks();
  Object.keys(textContents).forEach(k => delete textContents[k]);
  pdfDoc = null;
  document.getElementById('pdf-area').innerHTML = '<div class="hint" style="margin-top:60px">加载中…</div>';
  try {
    pdfDoc = await pdfjsLib.getDocument(`/pdf?path=${encodeURIComponent(path)}`).promise;
    document.getElementById('pdf-area').innerHTML = '';
    for (let p = 1; p <= Math.min(n, pdfDoc.numPages); p++) await renderPage(p);
  } catch(e) {
    document.getElementById('pdf-area').innerHTML =
      `<div class="hint" style="color:#c5221f;margin-top:60px">失败: ${e.message}</div>`;
  }
};

async function renderPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({ scale: SCALE });
  viewports[pageNum] = vp;
  const dpr = window.devicePixelRatio || 1;

  const wrapper = document.createElement('div');
  wrapper.className = 'page-wrapper';
  wrapper.dataset.page = pageNum;
  wrapper.style.cssText = `width:${vp.width}px;height:${vp.height}px`;

  const canvas = document.createElement('canvas');
  canvas.width = Math.floor(vp.width * dpr);
  canvas.height = Math.floor(vp.height * dpr);
  canvas.style.cssText = `width:${vp.width}px;height:${vp.height}px`;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  wrapper.appendChild(canvas);

  const tlDiv = document.createElement('div');
  tlDiv.className = 'pdf-text-layer textLayer';
  tlDiv.style.cssText = `width:${vp.width}px;height:${vp.height}px`;
  wrapper.appendChild(tlDiv);

  const tc = await page.getTextContent();
  textContents[pageNum] = tc;
  await new pdfjsLib.TextLayer({ textContentSource: tc, container: tlDiv, viewport: vp }).render();

  attachEvents(wrapper, tlDiv, pageNum, vp);
  document.getElementById('pdf-area').appendChild(wrapper);
}

// ── 冻结高亮 ─────────────────────────────────────────────
function freezeSelection(sel) {
  if (!sel || sel.rangeCount === 0) return { frozen: null, actual: null };
  const range = sel.getRangeAt(0);
  if (range.collapsed) return { frozen: null, actual: null };

  const sc = range.startContainer;
  const ec = range.endContainer;
  const so = range.startOffset;
  const eo = range.endOffset;

  if (sc.nodeType !== 3) {
    sel.removeAllRanges();
    return { frozen: sel.toString().replace(/\n/g,' ').trim(), actual: null };
  }

  let actualFrozen = null;
  try {
    if (sc === ec) {
      const text = sc.textContent || '';
      actualFrozen = text.slice(so, eo);
      const parent = sc.parentNode;
      if (parent) {
        const mark = document.createElement('mark');
        mark.className = 'frozen-sel';
        mark.textContent = actualFrozen;
        const frag = document.createDocumentFragment();
        if (so > 0) frag.appendChild(document.createTextNode(text.slice(0, so)));
        frag.appendChild(mark);
        if (eo < text.length) frag.appendChild(document.createTextNode(text.slice(eo)));
        parent.replaceChild(frag, sc);
      }
    } else {
      const text = sc.textContent || '';
      actualFrozen = text.slice(so);
      const parent = sc.parentNode;
      if (parent) {
        const mark = document.createElement('mark');
        mark.className = 'frozen-sel';
        mark.textContent = actualFrozen;
        const frag = document.createDocumentFragment();
        if (so > 0) frag.appendChild(document.createTextNode(text.slice(0, so)));
        frag.appendChild(mark);
        parent.replaceChild(frag, sc);
      }
    }
  } catch(e) {
    actualFrozen = sel.toString().replace(/\n/g,' ').trim();
    console.log('[freeze] failed:', e.message);
  }

  sel.removeAllRanges();
  return { frozen: actualFrozen, actual: actualFrozen };
}

function clearFrozenMarks() {
  document.querySelectorAll('mark.frozen-sel').forEach(m => {
    const p = m.parentNode;
    if (!p) return;
    while (m.firstChild) p.insertBefore(m.firstChild, m);
    p.removeChild(m);
  });
}

// ── 路径 2：左扩右收 ─────────────────────────────────────
// 左边：往左扩展到词起始（补全开头被截断的字符）
// 右边：往左收缩到词末尾（去掉结尾被截断的字符）
function expandLeftShrinkRight(str, start, end) {
  const sep = /[\s\(\)\[\]\{\},;:.。，、；：""''!?！？]/;
  // 左扩：找词起始
  let lo = start;
  while (lo > 0 && !sep.test(str[lo - 1])) lo--;
  // 右收：从 end 往左找，直到遇到空格/标点，取其前一个词的末尾
  let hi = end;
  // 如果 end 正好在词末尾（下一个字符是分隔符或结尾），不收缩
  // 如果 end 在词中间，往左退到该词的起始，取上一个词的末尾
  if (hi < str.length && !sep.test(str[hi])) {
    // end 在词中间：往左退到词起始
    while (hi > lo && !sep.test(str[hi - 1])) hi--;
    // hi 现在在词起始，再往左跳过分隔符
    while (hi > lo && sep.test(str[hi - 1])) hi--;
  }
  return str.slice(lo, hi).trim();
}

// ── 路径 3：坐标映射 ─────────────────────────────────────
function coordPath(items, pageH, downX, downY, upX, upY) {
  // 判断是否跨行：Y 差超过 5pt 才认为是跨行
  const deltaY = Math.abs(downY - upY);
  const isMultiLine = deltaY > 5;

  // 规范化：跨行时按 Y 排序，同行时按 X 排序
  let startX, startY, endX, endY;
  if (isMultiLine) {
    // 跨行：Y 小的是起点
    const reversed = downY > upY;
    startX = reversed ? upX   : downX;
    startY = reversed ? upY   : downY;
    endX   = reversed ? downX : upX;
    endY   = reversed ? downY : upY;
  } else {
    // 同行：X 小的是起点
    const reversed = downX > upX;
    startX = reversed ? upX   : downX;
    startY = reversed ? upY   : downY;
    endX   = reversed ? downX : upX;
    endY   = reversed ? downY : upY;
  }

  // 选区矩形（PDF 坐标系）
  const selLeft   = Math.min(startX, endX);
  const selRight  = Math.max(startX, endX);
  const selTop    = Math.min(startY, endY);
  const selBottom = Math.max(startY, endY);

  // 用规范化后的坐标做字符偏移估算
  const normDownX = startX;
  const normUpX   = endX;

  // 找所有与选区矩形有交叉的 item
  const hits = [];
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    if (!it.str.trim()) continue;
    const fontH = it.height || Math.abs(it.transform[3]) || 12;
    const baselineY = pageH - it.transform[5];  // 屏幕 Y（PDF 坐标系单位）
    const ix  = it.transform[4];
    const iy  = baselineY - fontH;
    const ix2 = ix + Math.abs(it.width);
    const iy2 = baselineY + fontH * 0.3;

    const cy = (iy + iy2) / 2;
    const hOverlap = ix < selRight && ix2 > selLeft;
    const vHit = cy >= selTop && cy <= selBottom;
    if (hOverlap && vHit) {
      hits.push({ idx: i, it, ix, iy, ix2, iy2, fontH });
    }
  }

  if (hits.length === 0) return { text: null, hits: [], detail: '无命中 item' };

  // 按 Y 排序（从上到下），同行按 X 排序
  hits.sort((a, b) => (a.iy - b.iy) || (a.ix - b.ix));

  // 对首尾 item 用 X 坐标估算字符偏移
  const parts = [];
  const detail = [];

  for (let i = 0; i < hits.length; i++) {
    const { it, ix, ix2 } = hits[i];
    const str = it.str;
    const strLen = str.length;

    let startChar = 0;
    let endChar = strLen;

    if (i === 0) {
      // 起始 item：用规范化后的起点 X 估算起始字符
      const xInItem = Math.max(0, Math.min(normDownX - ix, ix2 - ix));
      startChar = Math.round((xInItem / (ix2 - ix)) * strLen);
    }
    if (i === hits.length - 1) {
      // 结束 item：用规范化后的终点 X 估算结束字符
      const xInItem = Math.max(0, Math.min(normUpX - ix, ix2 - ix));
      endChar = Math.round((xInItem / (ix2 - ix)) * strLen);
    }

    const slice = str.slice(startChar, endChar).trim();
    if (slice) parts.push(slice);

    detail.push({
      idx: hits[i].idx,
      str: str.slice(0, 40),
      startChar, endChar,
      slice,
      itemX: ix.toFixed(1), itemWidth: (ix2 - ix).toFixed(1),
    });
  }

  return {
    text: parts.join(' ').trim(),
    hits: hits.map(h => h.idx),
    detail,
  };
}

// ── 事件绑定（Canvas 拉框模式）─────────────────────────────
function attachEvents(wrapper, tlDiv, pageNum, vp) {
  const pageH = vp.height / SCALE;

  // 创建 overlay canvas（与 PDF canvas 同尺寸）
  const dpr = window.devicePixelRatio || 1;
  const overlay = document.createElement('canvas');
  overlay.className = 'select-overlay';
  overlay.width  = Math.floor(vp.width  * dpr);
  overlay.height = Math.floor(vp.height * dpr);
  overlay.style.cssText = `width:${vp.width}px;height:${vp.height}px`;
  wrapper.appendChild(overlay);
  const ctx = overlay.getContext('2d');
  ctx.scale(dpr, dpr);

  let dragging = false;
  let downScreenX = 0, downScreenY = 0;
  let downPdfX = 0, downPdfY = 0;
  let curPdfX = 0, curPdfY = 0;

  function clearOverlay() {
    ctx.clearRect(0, 0, vp.width, vp.height);
  }

  function drawRect(x1, y1, x2, y2) {
    clearOverlay();
    const rx = Math.min(x1, x2) * SCALE;
    const ry = Math.min(y1, y2) * SCALE;
    const rw = Math.abs(x2 - x1) * SCALE;
    const rh = Math.abs(y2 - y1) * SCALE;
    ctx.fillStyle   = 'rgba(66,133,244,0.18)';
    ctx.strokeStyle = 'rgba(66,133,244,0.9)';
    ctx.lineWidth   = 1.5;
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeRect(rx, ry, rw, rh);
  }

  overlay.addEventListener('mousedown', (e) => {
    dragging = true;
    const rect = wrapper.getBoundingClientRect();
    downScreenX = e.clientX;
    downScreenY = e.clientY;
    downPdfX = (e.clientX - rect.left) / SCALE;
    downPdfY = (e.clientY - rect.top)  / SCALE;
    curPdfX = downPdfX;
    curPdfY = downPdfY;
    clearOverlay();
    e.preventDefault();
  });

  overlay.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = wrapper.getBoundingClientRect();
    curPdfX = (e.clientX - rect.left) / SCALE;
    curPdfY = (e.clientY - rect.top)  / SCALE;
    drawRect(downPdfX, downPdfY, curPdfX, curPdfY);
  });

  overlay.addEventListener('mouseup', (e) => {
    if (!dragging) return;
    dragging = false;

    const rect = wrapper.getBoundingClientRect();
    const upScreenX = e.clientX;
    const upScreenY = e.clientY;
    const upPdfX = (e.clientX - rect.left) / SCALE;
    const upPdfY = (e.clientY - rect.top)  / SCALE;

    // 忽略点击（拖拽距离 < 4px）
    const dx = Math.abs(upScreenX - downScreenX);
    const dy = Math.abs(upScreenY - downScreenY);
    if (dx < 4 && dy < 4) { clearOverlay(); return; }

    // 保留矩形框（视觉反馈）
    drawRect(downPdfX, downPdfY, upPdfX, upPdfY);

    const items = textContents[pageNum]?.items || [];

    // 路径 3：坐标映射（唯一路径）
    const path3Result = coordPath(items, pageH, downPdfX, downPdfY, upPdfX, upPdfY);

    const pdfName = document.getElementById('pdf-select').value.split('/').pop() || '?';
    const regionOther = document.getElementById('region-other').value.trim();
    const region = currentRegion === 'other' && regionOther ? regionOther : currentRegion;

    currentEntry = {
      id: Date.now(),
      pdf: pdfName, pageNum, region,
      mode: 'canvas-rect',
      // 坐标原始数据
      coords: {
        downScreen: [downScreenX, downScreenY],
        upScreen:   [upScreenX,   upScreenY],
        downPdf:    [+downPdfX.toFixed(2), +downPdfY.toFixed(2)],
        upPdf:      [+upPdfX.toFixed(2),   +upPdfY.toFixed(2)],
      },
      // 路径3（坐标映射，唯一路径）
      path3: path3Result.text || null,
      path3Detail: path3Result.detail,
      // 用户输入
      userWanted: '',
      note: '',
      // 反馈
      fb: { path3: null },
    };

    renderPanel(currentEntry);
  });
}

// ── 面板渲染 ─────────────────────────────────────────────
const regionLabels = {body:'正文',title:'大标题',heading:'小标题',abstract:'摘要',header:'页眉页脚',formula:'公式',caption:'图注表注',other:'其他'};

function renderPanel(entry) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  const { path3, region, pageNum, coords } = entry;

  // ── 坐标映射结果 ──
  const b1 = document.createElement('div');
  b1.className = 'block';
  const resultColor = path3 ? '#333' : '#aaa';
  b1.innerHTML = `
    <div class="block-hd">
      <span>坐标映射结果</span>
      <span style="font-size:10px;color:#888">${regionLabels[region]||region} · p${pageNum}</span>
    </div>
    <div class="path-row">
      <div class="path-row-top">
        <span class="path-label">路径3 Canvas 拉框</span>
        <div class="path-fb">
          <button onclick="fbPath('path3',true,this)">✓ 准确</button>
          <button onclick="fbPath('path3',false,this)">✗ 偏差</button>
        </div>
      </div>
      <span class="path-value" style="color:${resultColor}">${path3 ? `"${esc(path3)}"` : '— 无命中'}</span>
    </div>
  `;
  main.appendChild(b1);

  // ── 命中 item 列表 ──
  if (entry.path3Detail?.length > 0) {
    const bd = document.createElement('div');
    bd.className = 'block';
    const rows = entry.path3Detail.map(d => `
      <div class="data-row">
        <span class="dk">item#${d.idx}</span>
        <span class="dv">"${esc(d.str.slice(0,40))}" → <b>"${esc(d.slice)}"</b> (char ${d.startChar}→${d.endChar})</span>
      </div>`).join('');
    bd.innerHTML = `<div class="block-hd">命中 ${entry.path3Detail.length} 个 item</div>${rows}`;
    main.appendChild(bd);
  }

  // ── 你想要的 ──
  const b2 = document.createElement('div');
  b2.className = 'block';
  b2.innerHTML = `
    <div class="block-hd">你实际想选的文字</div>
    <input class="text-input" id="user-wanted" type="text" placeholder="填写你想要的文字（如有偏差）"
      onblur="updateWanted(this.value)"
      onkeydown="if(event.key==='Enter')updateWanted(this.value)">
  `;
  main.appendChild(b2);

  // ── 技术数据 ──
  const b3 = document.createElement('div');
  b3.className = 'block';
  b3.innerHTML = `
    <div class="block-hd">技术数据</div>
    <div class="data-row"><span class="dk">down PDF</span><span class="dv">(${coords.downPdf[0]}, ${coords.downPdf[1]})</span></div>
    <div class="data-row"><span class="dk">up PDF</span><span class="dv">(${coords.upPdf[0]}, ${coords.upPdf[1]})</span></div>
    <div class="data-row"><span class="dk">选区宽×高</span><span class="dv">${Math.abs(coords.upPdf[0]-coords.downPdf[0]).toFixed(1)} × ${Math.abs(coords.upPdf[1]-coords.downPdf[1]).toFixed(1)} pt</span></div>
    <div class="data-row"><span class="dk">命中 item 数</span><span class="dv">${entry.path3Detail?.length??0}</span></div>
  `;
  main.appendChild(b3);

  // ── 备注 ──
  const b4 = document.createElement('div');
  b4.className = 'block';
  b4.innerHTML = `
    <div class="block-hd">备注</div>
    <textarea class="note-input" id="note-input" placeholder="任何想说的（例外情况、异常现象等）"
      onblur="updateNote(this.value)"
      onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey))updateNote(this.value)"></textarea>
  `;
  main.appendChild(b4);

  // ── 按钮行 ──
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;';

  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.id = 'submit-btn';
  btn.style.flex = '1';
  btn.textContent = '提交给 Claude';
  btn.onclick = submitEntry;
  btnRow.appendChild(btn);

  const saveBtn = document.createElement('button');
  saveBtn.id = 'save-btn';
  saveBtn.style.cssText = 'padding:9px 12px;background:#188038;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;white-space:nowrap;';
  saveBtn.textContent = '★ 保存样本';
  saveBtn.onclick = saveSample;
  btnRow.appendChild(saveBtn);

  main.appendChild(btnRow);
}

function pathRow(key, label, value) {
  const display = value
    ? `<span class="path-value" title="${esc(value)}">"${esc(value)}"</span>`
    : `<span class="path-value" style="color:#aaa">—</span>`;
  return `
    <div class="path-row">
      <div class="path-row-top">
        <span class="path-label">${label}</span>
        <div class="path-fb">
          <button onclick="fbPath('${key}',true,this)">✓</button>
          <button onclick="fbPath('${key}',false,this)">✗</button>
        </div>
      </div>
      ${display}
    </div>
  `;
}

window.fbPath = function(key, ok, btn) {
  if (!currentEntry) return;
  currentEntry.fb[key] = ok;
  const row = btn.closest('.path-fb');
  row.querySelectorAll('button').forEach(b => { b.className = ''; });
  btn.className = ok ? 'ok' : 'bad';
};

window.updateWanted = function(val) {
  if (currentEntry) currentEntry.userWanted = val;
};

window.updateNote = function(val) {
  if (currentEntry) currentEntry.note = val;
};

function submitEntry() {
  if (!currentEntry) return;
  const wantedEl = document.getElementById('user-wanted');
  const noteEl   = document.getElementById('note-input');
  if (wantedEl) currentEntry.userWanted = wantedEl.value.trim();
  if (noteEl)   currentEntry.note = noteEl.value.trim();

  const { pdf, pageNum, region, path3, userWanted, note, fb, coords, path3Detail } = currentEntry;
  const rl = regionLabels;

  const lines = [
    `[Canvas 拉框] PDF: ${pdf}  页: ${pageNum}  区域: ${rl[region]||region}`,
    ``,
    `路径3 坐标映射: "${path3||'—'}"  → ${fb.path3===true?'✓ 准确':fb.path3===false?'✗ 偏差':'未评价'}`,
    `你想要的:       "${userWanted||'（未填）'}"`,
    `备注: ${note||'（无）'}`,
    ``,
    `--- 技术数据 ---`,
    `down PDF: (${coords.downPdf})  up PDF: (${coords.upPdf})`,
    `选区: ${Math.abs(coords.upPdf[0]-coords.downPdf[0]).toFixed(1)} × ${Math.abs(coords.upPdf[1]-coords.downPdf[1]).toFixed(1)} pt`,
    `命中 ${path3Detail?.length||0} 个 item${path3Detail?.[0] ? `: item#${path3Detail[0].idx} charOffset ${path3Detail[0].startChar}→${path3Detail[0].endChar}` : ''}`,
  ].join('\n');

  document.getElementById('output-text').value = lines;
  console.log('[submit]', currentEntry);

  fetch('/report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentEntry),
  }).catch(() => {});

  const btn = document.getElementById('submit-btn');
  if (btn) { btn.textContent = '✓ 已提交'; btn.className = 'submit-btn done'; }
}

window.saveSample = function() {
  if (!currentEntry) return;
  const wantedEl = document.getElementById('user-wanted');
  const noteEl   = document.getElementById('note-input');
  if (wantedEl) currentEntry.userWanted = wantedEl.value.trim();
  if (noteEl)   currentEntry.note = noteEl.value.trim();

  fetch('/save-sample', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentEntry),
  }).then(() => {
    const btn = document.getElementById('save-btn');
    if (btn) { btn.textContent = '✓ 已保存'; btn.style.background = '#1557b0'; }
  }).catch(() => {});
};

window.copyOutput = function() {
  const ta = document.getElementById('output-text');
  ta.select();
  document.execCommand('copy');
};

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.clearAll = function() {
  clearFrozenMarks();
  // 清除所有 overlay canvas 上的矩形框
  document.querySelectorAll('canvas.select-overlay').forEach(c => {
    const ctx2 = c.getContext('2d');
    ctx2.clearRect(0, 0, c.width, c.height);
  });
  currentEntry = null;
  document.getElementById('main').innerHTML = '<div class="hint">已清空</div>';
  document.getElementById('output-text').value = '';
};
</script>
</body>
</html>
