<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer - Markdown Viewer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/web/pdf_viewer.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.worker.mjs';
    window.pdfjsLib = pdfjsLib;
    window.dispatchEvent(new Event('pdfjslib-ready'));
  </script>
  <link rel="stylesheet" href="/client.css">
  <style id="theme-md-css"></style>
  <style id="theme-hl-css"></style>
</head>
<body>
  <div class="app">
    <div class="app-body">
      <!-- 侧边栏 -->
      <aside class="sidebar">
      <div class="sidebar-header">
        <!-- 搜索框 -->
        <div class="sidebar-search-row">
          <div id="searchBox" style="flex:1;min-width:0;"></div>
          <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="收起侧边栏" aria-label="收起侧边栏">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2.5" width="12" height="11" rx="1.5" fill="none"/><path d="M6 2.5v11"/></svg>
          </button>
        </div>
        <div id="modeSwitchRow"></div>
        <div class="quick-action-confirm-host">
          <div class="add-file-confirm" id="quickActionConfirm" style="display: none;">
            <div class="add-file-confirm-text" id="quickActionConfirmText"></div>
            <div class="add-file-confirm-actions" id="quickActionConfirmActions"></div>
          </div>
        </div>
        <!-- 当前文件路径 -->
        <div id="currentPath"></div>
      </div>

      <!-- 文件列表区（上半部分） -->
      <div class="file-list" id="fileList">
        <div class="empty-tip">暂无文件</div>
      </div>

      <!-- TOC 分隔条 -->
      <div class="toc-resizer" id="tocResizer"></div>

      <!-- TOC 收起时的展开按钮 -->
      <button class="toc-open-btn" id="tocOpenBtn" title="展开目录" aria-label="展开目录">
        <span>目录</span>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M4 10l4-4 4 4"/></svg>
      </button>

      <!-- TOC 面板（下半部分） -->
      <div class="toc-pane" id="tocPane">
        <div class="toc-panel" id="tocPanel">
          <div class="toc-empty">无目录</div>
        </div>
      </div>
      </aside>
      <div class="sidebar-resizer" id="sidebarResizer" title="拖拽调整侧边栏宽度"></div>
      <button class="sidebar-floating-open-btn" id="sidebarFloatingOpenBtn" title="展开侧边栏" aria-label="展开侧边栏">
        <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2.5" width="12" height="11" rx="1.5" fill="none"/><path d="M6 2.5v11"/><path d="M9 6l2 2-2 2"/></svg>
      </button>

      <!-- 主区域 -->
      <main class="main">
      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="spacer"></div>
        <button class="toolbar-text-button" id="pdfModeSelectBtn" data-action="set-pdf-mode" data-mode="select" title="文本选择模式" style="display:none">
          <span>[𝐓 选择]</span>
        </button>
        <button class="toolbar-text-button" id="pdfModeAnnotateBtn" data-action="set-pdf-mode" data-mode="annotate" title="拉框批注模式" style="display:none">
          <span>[⬚ 批注]</span>
        </button>
        <button class="toolbar-text-button" id="diffButton" data-action="diff-button" style="display: none;" title="查看修改内容">
          <span id="diffButtonText">[± Diff]</span>
        </button>
        <button class="toolbar-text-button" id="refreshButton" data-action="refresh-button" style="display: none;" title="文件已更新，点击刷新">
          <span id="refreshButtonText">[↻ 刷新]</span>
        </button>
        <button class="toolbar-text-button" id="translateButton" data-action="translate-button" title="切换段落翻译（英→中）">
          <span id="translateButtonText">[译]</span>
        </button>
        <div class="zoom-control" id="zoomControl">
          <button class="zoom-step-btn" id="zoomOutBtn" data-action="zoom-out" title="缩小 (⌘−)">−</button>
          <input class="zoom-input" id="fontScaleInput" type="text" value="100%" title="缩放比例，可直接输入（如 150%）" />
          <button class="zoom-step-btn" id="zoomInBtn" data-action="zoom-in" title="放大 (⌘+)">+</button>
        </div>
        <button class="toolbar-text-button" id="monitorButton" data-action="toggle-monitor" title="系统监控">
          <span>[◫ 监控]</span>
        </button>
        <button class="toolbar-text-button" data-action="show-settings" title="设置">
          <span id="settingsButtonText">[⚙ 设置]</span>
        </button>
      </div>

      <!-- 系统监控浮窗 -->
      <div class="monitor-panel" id="monitorPanel" style="display: none;">
        <div class="monitor-panel-header">
          <div class="monitor-tabs">
            <button class="monitor-tab is-active" data-action="switch-monitor-tab" data-tab="memory">内存</button>
            <button class="monitor-tab" data-action="switch-monitor-tab" data-tab="sessions">Agent Sessions</button>
          </div>
          <button class="monitor-close" data-action="toggle-monitor" title="关闭">×</button>
        </div>
        <div class="monitor-body">
          <div class="monitor-tab-panel" id="monitorTabMemory"></div>
          <div class="monitor-tab-panel" id="monitorTabSessions" style="display:none;"></div>
        </div>
      </div>

      <!-- 标签页 -->
      <div class="tabs" id="tabs"></div>

      <!-- 内容区 -->
      <div class="content" id="content">
        <div class="empty-state">
          <h2>欢迎使用 MD Viewer</h2>
          <p>在左侧添加 Markdown 文件开始阅读</p>
        </div>
      </div>
      <!-- 自定义滚动条 -->
      <div id="docScrollbar" class="doc-scrollbar" style="display:none">
        <div class="doc-scrollbar-markers"></div>
        <div class="doc-scrollbar-thumb"></div>
      </div>
      <!-- PDF 页码指示器 -->
      <div id="pdfPageIndicator" class="pdf-page-indicator" style="display:none">
        <span class="pdf-page-indicator-label"></span>
        <input class="pdf-page-indicator-input" type="number" min="1" style="display:none" />
      </div>
      </main>
    </div><!-- /.app-body -->

    <!-- 评论侧边栏 -->
    <aside class="annotation-sidebar" id="annotationSidebar">
      <div class="annotation-tabs" id="annotationTabs">
        <button class="annotation-tab is-active" data-tab="comments" data-action="switch-annotation-tab">评论<span class="annotation-tab-count" id="annotationTabCount"></span></button>
        <button class="annotation-tab" data-tab="todo" data-action="switch-annotation-tab">Todo<span class="annotation-tab-count" id="todoTabCount"></span></button>
        <button class="annotation-tab" id="annotationChatTab" data-tab="chat" data-action="switch-annotation-tab">✨ Chat</button>
        <div class="annotation-tab-actions">
          <div class="annotation-tab-actions-group" id="annotationCommentsActions">
            <button class="annotation-icon-btn" id="annotationDensityToggle" title="切换默认/极简" aria-label="切换默认/极简">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 3h10v1H3zm0 4h10v1H3zm0 4h10v1H3z"/></svg>
            </button>
            <button class="annotation-icon-btn" id="annotationFilterToggle" title="筛选" aria-label="筛选">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3h12L9.5 8v4.5l-3-1.5V8z"/></svg>
            </button>
          </div>
          <div class="annotation-tab-actions-group hidden" id="annotationTodoActions">
            <button class="annotation-icon-btn" id="todoFilterToggle" title="筛选" aria-label="筛选">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3h12L9.5 8v4.5l-3-1.5V8z"/></svg>
            </button>
          </div>
          <button class="annotation-icon-btn" id="annotationSplitToggle" title="拆分 Chat 面板" aria-label="拆分 Chat 面板">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="3" width="5" height="10" rx=".5"/><rect x="9" y="3" width="5" height="10" rx=".5"/></svg>
          </button>
          <button class="annotation-icon-btn" id="annotationSidebarClose" title="收起评论" aria-label="收起评论">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none"><rect x="2" y="2.5" width="12" height="11" rx="1.5" fill="none"/><path d="M10 2.5v11"/></svg>
          </button>
        </div>
        <div class="annotation-filter-menu hidden" id="annotationFilterMenu">
          <button class="annotation-filter-item" data-filter="all">全部</button>
          <button class="annotation-filter-item is-active" data-filter="open">未解决</button>
          <button class="annotation-filter-item annotation-filter-sub hidden" data-action="toggle-include-unanchored">+ 含失锚</button>
          <button class="annotation-filter-item" data-filter="resolved">已解决</button>
          <button class="annotation-filter-item" data-filter="unanchored">失锚</button>
        </div>
        <div class="annotation-filter-menu hidden" id="todoFilterMenu">
          <button class="annotation-filter-item is-active" data-todo-filter="open">未完成</button>
          <button class="annotation-filter-item" data-todo-filter="all">全部</button>
        </div>
      </div>
      <div class="annotation-list" id="annotationList">
        <div class="annotation-empty">无评论（选中文本即可添加）</div>
      </div>
      <div class="chat-list" id="chatList" style="display:none;"></div>
      <div class="todo-panel" id="todoPanel" style="display:none;">
        <div class="todo-list-container" id="todoListContainer"></div>
      </div>
    </aside>
    <div class="annotation-sidebar-resizer" id="annotationSidebarResizer" title="拖拽调整评论栏宽度"></div>
    <!-- 拆分模式下独立的 Chat 面板 -->
    <aside class="chat-sidebar" id="chatSidebar" style="display:none;">
      <div class="annotation-tabs">
        <span class="annotation-tab is-active" style="pointer-events:none;">✨ Chat</span>
        <div class="annotation-tab-actions">
          <button class="annotation-icon-btn" id="chatSidebarMergeBtn" title="合并回评论面板" aria-label="合并回评论面板">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="3" width="12" height="10" rx=".5" fill="none"/><line x1="8" y1="3" x2="8" y2="13"/></svg>
          </button>
        </div>
      </div>
      <div class="chat-list" id="chatListSplit"></div>
    </aside>
    <div class="annotation-sidebar-resizer" id="chatSidebarResizer" style="display:none;" title="拖拽调整 Chat 面板宽度"></div>
    <button class="annotation-floating-open-btn" id="annotationFloatingOpenBtn" title="打开评论侧边栏" aria-label="打开评论侧边栏">
      <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2.5" width="12" height="11" rx="1.5" fill="none"/><path d="M6 2.5v11"/><path d="M9 6l-2 2 2 2"/></svg>
    </button>
    <button class="todo-floating-btn" id="todoFloatingBtn" title="打开 Todo" aria-label="打开 Todo">
      <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8l3.5 3.5L13 4.5"/></svg>
      <span class="todo-floating-badge hidden" id="todoFloatingBadge"></span>
    </button>

    <!-- 状态栏：全宽，不受左右 sidebar 影响 -->
    <div class="statusbar" id="statusbar">
      <div class="sb-spacer"></div>
      <span class="sb-item" id="sbCreatedAt"></span>
      <span class="sb-item" id="sbCharCount"></span>
      <span class="sb-item sb-connection" id="sbConnection">
        <span class="sb-dot" id="sbDot"></span>
        <span id="sbConnectionText"></span>
      </span>
    </div>
  </div>

  <!-- 评论创建浮窗 -->
  <div id="annotationComposer" class="annotation-composer hidden">
    <div id="annotationComposerHeader" class="annotation-composer-header">
      <div class="annotation-row-top">
        <div class="annotation-row-title">新评论</div>
        <div class="annotation-row-actions">
          <button id="composerCancelBtn" class="annotation-icon-action" title="取消" aria-label="取消">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4.2 4.2L8 8l3.8-3.8 1 1L9 9l3.8 3.8-1 1L8 10l-3.8 3.8-1-1L7 9 3.2 5.2z"/></svg>
          </button>
          <button id="composerSaveBtn" class="annotation-icon-action resolve" title="保存" aria-label="保存">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6.4 11.2L3.5 8.3l1.1-1.1 1.8 1.8 5-5 1.1 1.1z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="annotation-reply-entry annotation-composer-input">
      <textarea id="composerNote" rows="1" placeholder="输入评论内容（Cmd+Enter 提交）"></textarea>
    </div>
  </div>

  <!-- Todo 创建浮窗 -->
  <div id="todoComposer" class="annotation-composer hidden">
    <div id="todoComposerHeader" class="annotation-composer-header">
      <div class="annotation-row-top">
        <div class="annotation-row-title">添加 Todo</div>
        <div class="annotation-row-actions">
          <button id="todoComposerCancel" class="annotation-icon-action" title="取消" aria-label="取消">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4.2 4.2L8 8l3.8-3.8 1 1L9 9l3.8 3.8-1 1L8 10l-3.8 3.8-1-1L7 9 3.2 5.2z"/></svg>
          </button>
          <button id="todoComposerSave" class="annotation-icon-action resolve" title="添加" aria-label="添加">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6.4 11.2L3.5 8.3l1.1-1.1 1.8 1.8 5-5 1.1 1.1z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="todo-composer-quote" id="todoComposerQuote"></div>
    <div class="annotation-reply-entry annotation-composer-input">
      <textarea id="todoComposerNote" rows="2" placeholder="记录下一步要做什么…（Cmd+Enter 提交）"></textarea>
    </div>
  </div>

  <!-- 评论复制菜单 -->
  <div id="annotationCopyMenu" class="todo-copy-menu hidden">
    <div class="todo-copy-menu-item" id="annotationCopyAll">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="5" y="4" width="8" height="10" rx="1.5"/><path d="M3 11V3a1 1 0 011-1h7"/></svg>
      复制全部
    </div>
    <div class="todo-copy-menu-item" id="annotationCopyQuote">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M5 6h6M5 9h4"/></svg>
      仅划词
    </div>
    <div class="todo-copy-menu-item" id="annotationCopyNote">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M3 4h10M3 7h10M3 10h6"/></svg>
      仅评论
    </div>
  </div>

  <!-- Todo 复制菜单 -->
  <div id="todoCopyMenu" class="todo-copy-menu hidden">
    <div class="todo-copy-menu-item" id="todoCopyFile">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h7a1 1 0 001-1v-3"/><rect x="7" y="2" width="7" height="7" rx="1"/></svg>
      复制文件名
    </div>
    <div class="todo-copy-menu-item" id="todoCopyQuote">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M5 6h6M5 9h4"/></svg>
      复制划词原文
    </div>
    <div class="todo-copy-menu-item" id="todoCopyBoth">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="5" y="4" width="8" height="10" rx="1.5"/><path d="M3 11V3a1 1 0 011-1h7"/></svg>
      复制文件名 + 原文
    </div>
  </div>

  <!-- 划词后快速评论入口 -->
  <div id="annotationQuickAddWrap" class="annotation-quick-add-wrap hidden">
    <div class="quick-add-section">
      <button id="quickAddComment" class="quick-add-btn" title="添加评论" aria-label="添加评论">
        <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2.5" width="12" height="11" rx="1.5"/><path d="M5 6h6M5 9h4"/></svg>
        写评论…
      </button>
      <button id="quickAddTodo" class="quick-add-btn todo" title="添加 Todo" aria-label="添加 Todo">
        <svg viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8l3.5 3.5L13 4.5"/></svg>
        Todo
      </button>
    </div>
    <div class="quick-add-section hidden" id="quickPromptsSection">
      <div class="quick-add-section-label">快捷评论</div>
      <div id="quickPromptBtns"></div>
    </div>
  </div>

  <!-- 评论查看浮窗 -->
  <div id="annotationPopover" class="annotation-popover hidden">
    <div class="annotation-popover-header" id="annotationPopoverHeader">
      <div class="annotation-row-top">
        <div id="popoverTitle" class="annotation-row-title">#0</div>
        <div class="annotation-row-actions">
          <button id="popoverPrevBtn" class="annotation-icon-action" title="上一条" aria-label="上一条">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 4l4 4H4z"/></svg>
          </button>
          <button id="popoverNextBtn" class="annotation-icon-action" title="下一条" aria-label="下一条">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 12l-4-4h8z"/></svg>
          </button>
          <button id="popoverResolveBtn" class="annotation-icon-action resolve" title="标记已解决" aria-label="标记已解决">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6.4 11.2L3.5 8.3l1.1-1.1 1.8 1.8 5-5 1.1 1.1z"/></svg>
          </button>
          <button id="popoverCopyBtn" class="annotation-icon-action" title="复制原文" aria-label="复制原文">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 2h7l3 3v9H4V2zm1 1v10h8V6l-2-2H5V3zm-3 2v10h8v1H1V5h1z"/></svg>
          </button>
          <button id="popoverAskAiBtn" class="annotation-icon-action" title="Ask AI" aria-label="Ask AI">✨</button>
          <button id="popoverDeleteBtn" class="annotation-icon-action danger" title="删除评论" aria-label="删除评论">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6 2h4l1 1h3v1H2V3h3l1-1zm-1 4h1v7H5V6zm3 0h1v7H8V6zm3 0h1v7h-1V6z"/></svg>
          </button>
          <button id="popoverCloseBtn" class="annotation-icon-action" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4.2 4.2L8 8l3.8-3.8 1 1L9 9l3.8 3.8-1 1L8 10l-3.8 3.8-1-1L7 9 3.2 5.2z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="popoverNote" class="annotation-popover-note"></div>
  </div>

  <script src="/client.js"></script>
</body>
</html>
