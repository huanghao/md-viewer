<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; }

    #messages { flex: 1; overflow-y: auto; padding: 20px 0 8px; }

    .msg { max-width: 800px; margin: 0 auto 16px; padding: 0 20px; }

    .msg.user .bubble {
      background: #1c1c1c; border-radius: 12px; padding: 10px 14px;
      display: inline-block; max-width: 75%; float: right; clear: both;
      font-size: 14px; line-height: 1.6;
    }
    .msg.user { overflow: hidden; }

    .msg.assistant .bubble { font-size: 14px; line-height: 1.8; color: #ddd; }
    .msg.assistant .bubble p { margin-bottom: 10px; }
    .msg.assistant .bubble p:last-child { margin-bottom: 0; }
    .msg.assistant .bubble pre { background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 10px 0; }
    .msg.assistant .bubble code { font-family: "JetBrains Mono", monospace; font-size: 12.5px; }
    .msg.assistant .bubble :not(pre) > code { background: #1e1e1e; padding: 1px 5px; border-radius: 4px; }
    .msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3 { margin: 14px 0 6px; font-size: 15px; }
    .msg.assistant .bubble ul,.msg.assistant .bubble ol { padding-left: 18px; margin-bottom: 10px; }
    .msg.assistant .bubble li { margin-bottom: 3px; }
    .msg.assistant .bubble blockquote { border-left: 3px solid #333; padding-left: 12px; color: #888; margin: 8px 0; }

    .tool-call { background: #111; border: 1px solid #222; border-radius: 8px; padding: 8px 12px; margin: 6px 0; font-size: 12px; font-family: monospace; color: #888; }
    .tool-call .tool-name { color: #5a9fd4; font-weight: 600; }
    .tool-call .tool-result { color: #6a9955; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }

    .cursor { display: inline-block; width: 2px; height: 14px; background: #666; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 1px; }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area { padding: 12px 20px 16px; display: flex; gap: 8px; align-items: flex-end; max-width: 800px; width: 100%; margin: 0 auto; }
    #input { flex: 1; background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px 14px; color: #e8e8e8; font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 160px; line-height: 1.5; font-family: inherit; }
    #input:focus { border-color: #3a3a3a; }
    #send { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 9px 14px; color: #ccc; cursor: pointer; font-size: 13px; }
    #send:hover:not(:disabled) { background: #252525; }
    #send:disabled { opacity: 0.35; cursor: not-allowed; }
    #clear { background: none; border: none; color: #444; cursor: pointer; font-size: 12px; padding: 4px 8px; position: absolute; top: 12px; right: 16px; }
    #clear:hover { color: #666; }
    #status { position: absolute; top: 12px; left: 20px; font-size: 11px; color: #444; }
  </style>
</head>
<body>
  <div style="position:relative; height:28px; border-bottom:1px solid #1a1a1a; flex-shrink:0;">
    <span id="status">claude-haiku-4-5</span>
    <button id="clear" title="清空对话">清空</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" placeholder="发消息… (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
    <button id="send">发送</button>
  </div>

  <script>
    const SERVER = "http://localhost:3003";
    const sessionId = crypto.randomUUID();

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const statusEl = document.getElementById("status");

    function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function addUserMsg(text) {
      const div = document.createElement("div");
      div.className = "msg user";
      div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
      messagesEl.appendChild(div);
      scroll();
    }

    function addAssistantMsg() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.innerHTML = `<div class="bubble"></div>`;
      messagesEl.appendChild(div);
      scroll();
      return div.querySelector(".bubble");
    }

    function addToolCall(bubble, name, input) {
      const div = document.createElement("div");
      div.className = "tool-call";
      div.innerHTML = `<span class="tool-name">⚡ ${esc(name)}</span> ${esc(input)}`;
      bubble.appendChild(div);
      scroll();
      return div;
    }

    function scroll() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      statusEl.textContent = "thinking…";

      addUserMsg(text);
      const bubble = addAssistantMsg();
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      bubble.appendChild(cursor);

      let rawText = "";
      let currentToolDiv = null;

      try {
        const res = await fetch(`${SERVER}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, message: text }),
        });

        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop() ?? "";

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const ev = JSON.parse(line.slice(6));

            if (ev.type === "text_delta") {
              rawText += ev.delta;
              cursor.remove();
              bubble.innerHTML = marked.parse(rawText);
              bubble.appendChild(cursor);
              scroll();
            }
            if (ev.type === "tool_start") {
              cursor.remove();
              currentToolDiv = addToolCall(bubble, ev.name, ev.input);
              bubble.appendChild(cursor);
            }
            if (ev.type === "tool_end" && currentToolDiv) {
              const resultDiv = document.createElement("div");
              resultDiv.className = "tool-result";
              resultDiv.textContent = ev.result;
              currentToolDiv.appendChild(resultDiv);
              currentToolDiv = null;
              scroll();
            }
            if (ev.type === "error") {
              cursor.remove();
              bubble.innerHTML += `<div style="color:#f87171;margin-top:8px">错误: ${esc(ev.message)}</div>`;
            }
          }
        }
      } catch (e) {
        cursor.remove();
        bubble.innerHTML = `<div style="color:#f87171">连接失败: ${esc(e.message)}</div>`;
      }

      cursor.remove();
      statusEl.textContent = "claude-haiku-4-5";
      sendBtn.disabled = false;
      inputEl.focus();
    }

    document.getElementById("clear").addEventListener("click", async () => {
      await fetch(`${SERVER}/session/${sessionId}`, { method: "DELETE" });
      messagesEl.innerHTML = "";
    });

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
    });
  </script>
</body>
</html>
