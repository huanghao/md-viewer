<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab 管理器原型</title>
  <style>
    :root { --bg:#f3f6fb; --panel:#fff; --line:#dde3ec; --text:#1f2937; --muted:#6b7280; --blue:#0969da; --red:#b42318; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: ui-sans-serif, -apple-system, Segoe UI, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 1100px; margin: 28px auto; padding: 0 16px; }
    .toolbar { display:flex; justify-content:space-between; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
    .tabs-row { display:flex; gap:8px; overflow:auto; }
    .tab { background:#eef2f8; border:1px solid #dbe3ef; border-radius:8px; padding:6px 10px; white-space:nowrap; font-size:13px; }
    .tab.active { background:#fff; border-color:#c8d6ea; }
    .btn { border:1px solid #c9d5e7; border-radius:8px; background:#fff; padding:6px 10px; cursor:pointer; font-size:13px; }
    .btn.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
    .layout { display:grid; grid-template-columns: 1fr 360px; gap:14px; margin-top:14px; }
    .main { min-height:420px; border:1px solid var(--line); background:#fff; border-radius:10px; padding:16px; }
    .panel { border:1px solid var(--line); background:#fff; border-radius:10px; padding:12px; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
    .search { width:100%; padding:8px 10px; border:1px solid #cfd8e6; border-radius:8px; margin-bottom:8px; }
    .hint { font-size:12px; color:var(--muted); margin-bottom:8px; }
    .group { border:1px solid #e5ebf4; border-radius:8px; margin-top:8px; }
    .group-h { display:flex; justify-content:space-between; padding:8px 10px; background:#f8fbff; font-size:12px; color:#475467; }
    .item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-top:1px solid #eef2f7; font-size:13px; }
    .state { font-size:11px; border-radius:999px; padding:1px 6px; }
    .state.m { color:#9a6700; background:#fff8c5; }
    .state.d { color:#b42318; background:#ffe4e2; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="tabs-row">
        <div class="tab active">README.md</div>
        <div class="tab">sync-design.md</div>
        <div class="tab">api-spec.md</div>
        <div class="tab">test-plan.md</div>
        <div class="tab">notes.md</div>
      </div>
      <button class="btn primary">≡ Tabs</button>
    </div>

    <div class="layout">
      <div class="main">
        <h3>正文区域</h3>
        <p>保持当前阅读上下文不变。Tab 管理在右侧非模态面板完成。</p>
      </div>
      <aside class="panel">
        <div class="actions">
          <button class="btn">关闭其他</button>
          <button class="btn">关闭右侧</button>
          <button class="btn">关闭未修改</button>
          <button class="btn">关闭全部</button>
        </div>
        <input class="search" placeholder="搜索已打开文件（名称/路径）" />
        <div class="hint">将关闭 12 个文件（不含当前）</div>

        <div class="group">
          <div class="group-h"><span>最近使用（8）</span><span>展开</span></div>
          <div class="item"><span>sync-versioning.md</span><span>×</span></div>
          <div class="item"><span>state-machine.md</span><span class="state m">M</span></div>
          <div class="item"><span>deleted-note.md</span><span class="state d">D</span></div>
        </div>

        <div class="group">
          <div class="group-h"><span>其他（23）</span><span>折叠</span></div>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
