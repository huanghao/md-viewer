name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            target: bun-darwin-aarch64
          - os: macos-latest
            platform: darwin-x64
            target: bun-darwin-x64-baseline
          - os: ubuntu-latest
            platform: linux-x64
            target: bun-linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
            target: bun-linux-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            bun install && break || {
              echo "Attempt $i failed, retrying..."
              sleep 5
            }
          done

      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ./scripts/build-all.sh $VERSION
        env:
          BUN_TARGET: ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ./scripts/package.sh $VERSION ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdv-${{ matrix.platform }}
          path: packages/*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Calculate SHA256
        id: sha256
        run: |
          cd packages
          for dir in mdv-*; do
            cd "$dir"
            for file in *.tar.gz; do
              sha256sum "$file" | tee -a ../SHA256SUMS.txt
            done
            cd ..
          done
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/mdv-*/*.tar.gz
            packages/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
